<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toboolist</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <img class="header-logo" src="img/logo.png" alt="Boolean logo">
        <h1 class="header-title">Toboolist</h1>
    </header>
    <!-- /Header -->

    <!-- Main -->
    <main>
        <div class="container">
           
            <!-- Main nav -->
            <nav class="actions">
                <button class="btn btn-filled">Add task</button>
                <button class="btn btn-empty">Add section</button>
            </nav>
            <!-- /Main nav -->

            <!-- Tasks -->
            <div class="tasks">
                <ul class="main-list">
                    <li>
                        <h3><span class="arrow">&#9660;</span>New task</h3>
                        <ul class="secondary-list">
                            <li>
                                <span class="circle checked">&check;</span>
                                Quarterly newsletter
                                <span class="tag editorial">Editorial</span>
                            </li>
                        </ul>
                    </li>
                    <li>
                        <h3><span class="arrow">&#9660;</span>Today</h3>
                        <ul class="secondary-list">
                            <li>
                                <span class="circle checked">&check;</span>
                                Quarterly newsletter
                                <span class="tag editorial">Editorial</span>
                            </li>
                            <li>
                                <span class="circle cross">&cross;</span>
                                Quarterly newsletter
                                <span class="tag recruiting">Recruiting</span>
                            </li>
                        </ul>
                    </li>
                    <li>
                        <h3><span class="arrow">&#9660;</span>Upcoming</h3>
                    </li>
                </ul>
            </div>
            <!-- /Tasks -->

        </div>
    </main>
    <!-- /Main -->

</body>
</html>
